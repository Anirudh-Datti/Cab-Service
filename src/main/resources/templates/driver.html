<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Driver Page</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
    <h2>Driver ID: <span th:text="${driverId}" id="driverId"></span></h2>
    <div id="status">Connecting...</div>
    <hr />
    <div id="messages"></div>

    <script>
        const driverId = document.getElementById("driverId").textContent.trim();
        const statusEl = document.getElementById("status");
        const messagesEl = document.getElementById("messages");

        const socket = new SockJS('/ws');
        const stompClient = Stomp.over(socket);
        stompClient.debug = null; // cleaner console

        stompClient.connect({}, function () {
            statusEl.innerText = "Connected";

            stompClient.subscribe("/topic/update/driver/" + driverId, function (message) {
                const data = JSON.parse(message.body);

                const block = document.createElement("div");
                block.style.marginBottom = "12px";
                block.innerHTML = `
                    <b>Rider:</b> ${data.riderName} (${data.riderId})<br>
                    <b>Source:</b> (${data.source.x}, ${data.source.y})<br>
                    <b>Destination:</b> (${data.destination.x}, ${data.destination.y})<br>
                    <b>Fare:</b> ${data.fare}
                `;
                messagesEl.prepend(block);
            });
        }, function () {
            statusEl.innerText = "Connection failed";
        });
    </script>
</body>
</html>
